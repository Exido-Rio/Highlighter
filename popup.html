<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Saved Highlights</title>
</head>
<body class="popup">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e1e4e8; padding-bottom: 12px; margin-bottom: 16px;">
        <h2 style="border: none; margin: 0; padding: 0;">Highlighter</h2>
        <button id="clear-all-btn" class="action-btn delete-btn" style="padding: 4px 8px; font-size: 11px;">Clear All</button>
    </div>

    <div class="settings-section" id="initial-key-section">
        <input type="password" id="api-key" placeholder="OpenAI API Key (sk-...)">
        <button id="save-key-btn">Save</button>
        <span id="key-status" style="font-size: 12px; color: #28a745; display: none; font-weight: 600;">Saved!</span>
    </div>
    
    <div class="settings-section" id="saved-key-section" style="display: none; justify-content: space-between;">
        <span style="font-size: 13px; font-weight: 600; color: #28a745;">✓ API Key Configured</span>
        <button id="change-key-btn" style="background-color: #f6f8fa; color: #24292e; border: 1px solid #d1d5da;">Change Key</button>
    </div>
    
    <div id="highlights-list">
        <!-- Highlights will be injected here dynamically -->
    </div>
    <!-- Toast Container -->
    <div id="toast-container" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="custom-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Delete All Highlights?</h3>
            <p>This action cannot be undone. Are you sure?</p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="action-btn">Cancel</button>
                <button id="modal-confirm-btn" class="action-btn delete-btn">Delete All</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
